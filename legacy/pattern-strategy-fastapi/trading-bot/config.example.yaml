# -------- Account ----------------------------------------------------
account:
  mode: paper          # paper | live   (live is stubbed in v1)
  starting_equity: 100000  # ₹1,00,000 starting capital (raised from 10k on 12 Jun)
  currency: INR        # match your MT5 account's deposit currency

