#    broker calls them differently (e.g. US30->DJ30, BTCUSD->XBTUSD), set the
#    correct name here AND add a SymbolAliases entry in the EA. The engine
#    simply finds no bars (and safely skips) any symbol the broker doesn't push.
#  * pip_value here is a COLD-START FALLBACK only — once the EA connects, the
#    live SYMBOL_TRADE_TICK_VALUE drives exact position sizing.
